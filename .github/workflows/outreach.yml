name: Mutirao Rascunho -> Planilha do time

# Refresh a cada 3h (deteccao de quem finalizou) + botao "Run workflow".
# O merge em run normal escreve so AUTO/DESFECHO (race-safe; nao toca o MANUAL
# do time). Full-rewrite keyed so quando uma linha some (exclusao de conta).
#
# IMPORTANTE: nunca rodar com --sample no CI (repo publico = log publico).
# O run padrao imprime SO contadores; a planilha de saida e privada.
#
# Secret necessario alem dos do sync.py: OUTREACH_SPREADSHEET_ID (id da
# planilha dedicada do mutirao). FIREBASE/GOOGLE service accounts reusados.

on:
  schedule:
    - cron: '0 */3 * * *'   # a cada 3 horas (UTC)
  workflow_dispatch: {}

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Mutirao rascunho -> Sheets
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OUTREACH_SPREADSHEET_ID: ${{ secrets.OUTREACH_SPREADSHEET_ID }}
        run: python sync_outreach_rascunho.py
